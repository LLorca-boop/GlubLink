name: glublink
description: "GlubLink - система визуального кураторства"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # File system
  path_provider: ^2.1.3
  path: ^1.9.0

  # Code generation
  freezed_annotation: ^2.4.2
  json_annotation: ^4.9.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  very_good_analysis: ^6.0.0

  # Code generation
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
