name: glublink
description: A new Flutter project.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.4.0
  # Navigation
  go_router: ^12.0.0
  # File System
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  # Video & Media
  video_player: ^2.8.2
  visibility_detector: ^0.4.0+2
  cached_network_image: ^3.3.0
  # HTTP for AI API
  http: ^1.1.0
  # Secure Storage for API keys
  flutter_secure_storage: ^9.0.0
  # Crypto for hashing
  crypto: ^3.0.3
  # Share/Copy functionality
  share_plus: ^7.2.1
  # Image manipulation
  image: ^4.1.3
  # JSON serialization
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true